services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  db:
    image: postgres:16-alpine
    container_name: usav_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-devpassword123}
      POSTGRES_DB: ${DB_NAME:-inventory_system}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-inventory_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - usav_network

  # ==========================================================================
  # FastAPI Backend (Production)
  # ==========================================================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: usav_backend
    profiles:
      - prod
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-devpassword123}
      - DB_NAME=${DB_NAME:-inventory_system}
      - SEATALK_APP_ID=${SEATALK_APP_ID:-}
      - SEATALK_APP_SECRET=${SEATALK_APP_SECRET:-}
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID:-}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET:-}
      - ZOHO_REFRESH_TOKEN=${ZOHO_REFRESH_TOKEN:-}
      - ZOHO_ORGANIZATION_ID=${ZOHO_ORGANIZATION_ID:-}
      - ECWID_STORE_ID=${ECWID_STORE_ID:-}
      - ECWID_SECRET=${ECWID_SECRET:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - usav_network

  # ==========================================================================
  # Development Backend (with hot reload)
  # ==============================================                                      
  backend-dev:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: usav_backend_dev
    profiles:
      - dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      - ./Backend:/app
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-devpassword123}
      - DB_NAME=${DB_NAME:-inventory_system}
      - SEATALK_APP_ID=${SEATALK_APP_ID:-}
      - SEATALK_APP_SECRET=${SEATALK_APP_SECRET:-}
      - ECWID_STORE_ID=${ECWID_STORE_ID:-}
      - ECWID_SECRET=${ECWID_SECRET:-}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - usav_network

  # ==============================================                                      
  # Database Migrations (run once)
  # ==============================================                                      
  migrations:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: usav_migrations
    profiles:
      - migrate
    command: alembic upgrade head
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-devpassword123}
      - DB_NAME=${DB_NAME:-inventory_system}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - usav_network

  # ==============================================                                      
  # Background Worker Service (Order Sync, Stock Updates)
  # ==============================================                                      
  worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: usav_worker
    profiles:
      - prod
    command: python -m app.worker
    restart: unless-stopped
    environment:
      - DEBUG=${DEBUG:-false}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-devpassword123}
      - DB_NAME=${DB_NAME:-inventory_system}
      # Zoho
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID:-}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET:-}
      - ZOHO_REFRESH_TOKEN=${ZOHO_REFRESH_TOKEN:-}
      - ZOHO_ORGANIZATION_ID=${ZOHO_ORGANIZATION_ID:-}
      # Amazon
      - AMAZON_REFRESH_TOKEN=${AMAZON_REFRESH_TOKEN:-}
      - AMAZON_CLIENT_ID=${AMAZON_CLIENT_ID:-}
      - AMAZON_CLIENT_SECRET=${AMAZON_CLIENT_SECRET:-}
      # eBay
      - EBAY_MEKONG_APP_ID=${EBAY_MEKONG_APP_ID:-}
      - EBAY_MEKONG_CERT_ID=${EBAY_MEKONG_CERT_ID:-}
      - EBAY_MEKONG_USER_TOKEN=${EBAY_MEKONG_USER_TOKEN:-}
      - EBAY_USAV_APP_ID=${EBAY_USAV_APP_ID:-}
      - EBAY_USAV_CERT_ID=${EBAY_USAV_CERT_ID:-}
      - EBAY_USAV_USER_TOKEN=${EBAY_USAV_USER_TOKEN:-}
      - EBAY_DRAGON_APP_ID=${EBAY_DRAGON_APP_ID:-}
      - EBAY_DRAGON_CERT_ID=${EBAY_DRAGON_CERT_ID:-}
      - EBAY_DRAGON_USER_TOKEN=${EBAY_DRAGON_USER_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - usav_network

  # ==============================================                                      
  # Development Worker (with hot reload)
  # ==============================================                                      
  worker-dev:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: usav_worker_dev
    profiles:
      - dev
    command: python -m app.worker
    volumes:
      - ./Backend:/app
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-devpassword123}
      - DB_NAME=${DB_NAME:-inventory_system}
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID:-}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET:-}
      - ZOHO_REFRESH_TOKEN=${ZOHO_REFRESH_TOKEN:-}
      - ZOHO_ORGANIZATION_ID=${ZOHO_ORGANIZATION_ID:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - usav_network

  # ==============================================                                      
  # Automatic Backups
  # ==============================================                                      
  db-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: usav_backup
    restart: always
    volumes:
      - ./backups:/backups
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${DB_NAME:-inventory_system}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-devpassword123}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - usav_network

  # ==========================================================================
  # React Frontend (Production)
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SEATALK_APP_ID=${SEATALK_APP_ID:-}
        - VITE_SEATALK_REDIRECT_URI=${SEATALK_REDIRECT_URI:-}
    container_name: usav_frontend
    profiles:
      - prod
    restart: unless-stopped
    ports:
      - "3636:3636"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3636"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - usav_network

  # ==========================================================================
  # Development Frontend (with hot reload)
  # ==========================================================================
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: usav_frontend_dev
    profiles:
      - dev
    command: npm run dev -- --host 0.0.0.0 --port 3636
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
    environment:
      - VITE_SEATALK_APP_ID=${SEATALK_APP_ID:-}
      - VITE_SEATALK_REDIRECT_URI=${SEATALK_REDIRECT_URI:-}
    ports:
      - "3636:3636"
    depends_on:
      backend-dev:
        condition: service_healthy
    networks:
      - usav_network

  # ==========================================================================
  # pgAdmin (Database Management UI) - Optional
  # ==========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: usav_pgadmin
    profiles:
      - tools
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-it@usavshop.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - usav_network

# =============================================================================
# Networks
# =============================================================================
networks:
  usav_network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  pgadmin_data: